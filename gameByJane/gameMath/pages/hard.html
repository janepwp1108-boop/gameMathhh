<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Math Speed Challenge - Hard</title>

<link rel="stylesheet" href="../css/hard.css">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="bg">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="container">

    <div class="card">

        <div class="top">
            <a href="../index.html" class="home">🏠</a>
            <h1>🔥 ระดับยาก</h1>
        </div>

        <div class="stats">

            <div>
                คะแนน <br>
                <b id="score">0</b>
            </div>

            <div>
                Combo <br>
                <b id="combo">0</b>
            </div>

            <div>
                เวลา <br>
                <b id="time">60</b>
            </div>

        </div>

        <div class="bar">
            <div id="barFill"></div>
        </div>

        <div id="warning"></div>

        <div class="question">
            <h2 id="question">10 ÷ 2</h2>
        </div>

        <input
            id="answer"
            type="number"
            placeholder="ตอบคำถาม"
            autocomplete="off"
        >

        <button id="btn">ตอบ</button>

        <div id="feedback"></div>

    </div>

</div>

<!-- ================= MODAL ================= -->

<div id="modal" class="modal">

    <div class="modal-content">

        <h2>🏆 สรุปผล</h2>

        <p>คะแนนรวม : <span id="finalScore">0</span></p>

        <p>ตอบถูก : <span id="correct">0</span></p>

        <p>ตอบผิด : <span id="wrong">0</span></p>

        <p>Accuracy : <span id="acc">0</span></p>

        <p>High Score : <span id="high">0</span></p>

        <div class="modal-buttons">

            <button id="restartBtn">
                เล่นอีกครั้ง
            </button>

            <button onclick="location.href='../index.html'">
                กลับเมนู
            </button>

        </div>

    </div>

</div>

<!-- ================= SOUND ================= -->

<audio id="correctSound" src="../assets/sounds/correct.mp3"></audio>

<audio id="wrongSound" src="../assets/sounds/wrong.mp3"></audio>

<audio id="winSound" src="../assets/sounds/win.mp3"></audio>

<audio id="bgm" loop>
    <source src="../music/Subway Surfers Main Theme 2012 Original OFFICIAL.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", () => {
    document.getElementById("bgm").play();
}, { once: true });
</script>

<script src="../js/hard.js"></script>

</body>
</html>
