<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Speed Challenge - Medium</title>

    <link rel="stylesheet" href="../css/medium.css">

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="game-container">

    <div class="glass-card">

        <div class="top-bar">

            <a href="../index.html" class="home-btn">
                🏠
            </a>

            <h1>ระดับปานกลาง</h1>



        </div>

        <div class="status-grid">

            <div class="status-box">
                <h3>คะแนน</h3>
                <span id="score">0</span>
            </div>

            <div class="status-box">
                <h3>Combo</h3>
                <span id="combo">0</span>
            </div>

            <div class="status-box">
                <h3>เวลา</h3>
                <span id="timer">60</span>
            </div>

        </div>

        <div class="progress-wrap">
            <div id="progressBar"></div>
        </div>

        <div id="comboText" class="combo-text"></div>

        <div class="question-card">

            <h2 id="question">
                12 × 5
            </h2>

        </div>

        <input
            type="number"
            id="answerInput"
            placeholder="กรอกคำตอบ"
            autocomplete="off"
        >

        <button id="submitBtn">
            ตอบคำถาม
        </button>

        <div id="feedback"></div>

    </div>

</div>

<!-- RESULT MODAL -->

<div id="resultModal" class="modal">

    <div class="modal-content">

        <h2>🏆 สรุปผล</h2>

        <p>คะแนนรวม: <span id="finalScore"></span></p>

        <p>ตอบถูก: <span id="correctCount"></span></p>

        <p>ตอบผิด: <span id="wrongCount"></span></p>

        <p>Accuracy: <span id="accuracy"></span>%</p>

        <p>High Score: <span id="highScore"></span></p>

        <div class="modal-buttons">

            <button onclick="location.reload()">
                เล่นอีกครั้ง
            </button>

            <button onclick="location.href='../index.html'">
                กลับเมนู
            </button>

        </div>

    </div>

</div>

<audio id="correctSound" src="../assets/sounds/correct.mp3"></audio>
<audio id="wrongSound" src="../assets/sounds/wrong.mp3"></audio>
<audio id="winSound" src="../assets/sounds/win.mp3"></audio>

<script src="../js/medium.js"></script>
<audio id="bgm" loop>
    <source src="../music/Subway Surfers Main Theme 2012 Original OFFICIAL.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener('click', () => {
    document.getElementById('bgm').play();
}, { once: true });
</script>
</body>
</html>
